version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app
    ports:
      - "${SERVER_PORT}:9501"
    volumes:
      - .:/var/www/html
    working_dir: /var/www/html
    command: php server.php
    restart: unless-stopped
    networks:
      - app-network
    env_file:
      - .env
    depends_on:
      - postgres

  # PostgreSQL database
  postgres:
    image: postgres:17.5
    container_name: postgres-db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - ./db_data:/var/lib/postgresql/data
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  postgres-data:
